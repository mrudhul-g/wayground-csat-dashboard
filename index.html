<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSAT Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f0f2f6;
      --card:        #ffffff;
      --primary:     #4f46e5;
      --primary-lt:  #eef2ff;
      --good:        #16a34a;
      --good-bg:     #dcfce7;
      --bad:         #dc2626;
      --bad-bg:      #fee2e2;
      --warn:        #d97706;
      --warn-bg:     #fef3c7;
      --text:        #0f172a;
      --muted:       #64748b;
      --border:      #e2e8f0;
      --radius:      14px;
      --shadow:      0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* -- HEADER ---------------------------------------------------- */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200;
      box-shadow: var(--shadow);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .hicon {
      width: 34px; height: 34px;
      background: var(--primary); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 17px;
    }
    .htitle { font-size: 16px; font-weight: 700; }
    .htitle small { font-size: 12px; font-weight: 400; color: var(--muted); margin-left: 8px; }
    .live-badge {
      background: #dcfce7; color: #15803d;
      font-size: 11px; font-weight: 600;
      padding: 3px 9px; border-radius: 99px;
      display: flex; align-items: center; gap: 4px;
    }
    .live-dot { width:6px; height:6px; border-radius:50%; background:#16a34a; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .header-meta { font-size: 12px; color: var(--muted); }

    /* -- PAGE ------------------------------------------------------ */
    .page { max-width: 1440px; margin: 0 auto; padding: 24px 32px 48px; }

    /* -- FILTER BAR ------------------------------------------------ */
    .filter-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 20px;
      display: flex; align-items: flex-end; flex-wrap: wrap; gap: 14px;
      margin-bottom: 22px; box-shadow: var(--shadow);
    }
    .fg { display: flex; flex-direction: column; gap: 4px; }
    .fg label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing:.06em; }
    .fg input, .fg select {
      border: 1.5px solid var(--border); border-radius: 8px;
      padding: 7px 11px; font-size: 13px; color: var(--text);
      background: #fafafa; min-width: 140px; transition: border-color .15s;
    }
    .fg input:focus, .fg select:focus { outline: none; border-color: var(--primary); background: #fff; }
    .filter-sep { width: 1px; height: 36px; background: var(--border); align-self: flex-end; }
    .btn-primary {
      background: var(--primary); color: #fff;
      border: none; border-radius: 8px; padding: 8px 18px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-ghost {
      background: none; color: var(--muted);
      border: 1.5px solid var(--border); border-radius: 8px;
      padding: 7px 14px; font-size: 13px; cursor: pointer;
    }
    .btn-ghost:hover { border-color: #94a3b8; color: var(--text); }

    /* -- KPI CARDS ------------------------------------------------- */
    .kpi-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 22px; }
    .kpi-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 22px;
      box-shadow: var(--shadow); position: relative; overflow: hidden;
    }
    .kpi-card::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 4px; height: 100%; border-radius: 4px 0 0 4px;
    }
    .kpi-card.c-csat::before  { background: var(--primary); }
    .kpi-card.c-total::before { background: #0ea5e9; }
    .kpi-card.c-good::before  { background: var(--good); }
    .kpi-card.c-bad::before   { background: var(--bad); }
    .kpi-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing:.06em; margin-bottom: 8px; }
    .kpi-value { font-size: 36px; font-weight: 800; line-height: 1; letter-spacing: -.02em; }
    .kpi-card.c-csat  .kpi-value { color: var(--primary); }
    .kpi-card.c-total .kpi-value { color: #0369a1; }
    .kpi-card.c-good  .kpi-value { color: var(--good); }
    .kpi-card.c-bad   .kpi-value { color: var(--bad); }
    .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 5px; }
    .kpi-csat-high .kpi-value { color: var(--good) !important; }
    .kpi-csat-high::before    { background: var(--good) !important; }
    .kpi-csat-mid  .kpi-value { color: var(--warn) !important; }
    .kpi-csat-mid::before     { background: var(--warn) !important; }
    .kpi-csat-low  .kpi-value { color: var(--bad)  !important; }
    .kpi-csat-low::before     { background: var(--bad)  !important; }

    /* -- CHARTS ---------------------------------------------------- */
    .charts-grid {
      display: grid; grid-template-columns: 2fr 1fr 1fr;
      gap: 16px; margin-bottom: 22px;
    }
    .chart-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      box-shadow: var(--shadow);
    }
    .chart-head { font-size: 13px; font-weight: 700; margin-bottom: 16px; display:flex; align-items:center; justify-content:space-between; }
    .chart-head small { font-size: 11px; font-weight: 500; color: var(--muted); }

    /* -- TABLE SECTION --------------------------------------------- */
    .section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .section-title { font-size: 15px; font-weight: 700; }
    .badge-count {
      background: var(--bad-bg); color: var(--bad);
      font-size: 12px; font-weight: 700;
      padding: 2px 9px; border-radius: 99px;
    }
    .table-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow);
    }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #f8fafc; }
    th {
      padding: 11px 14px; text-align: left;
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spac)ng: .06em;
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafbff; }

    a.tid {
      font-family: 'SF Mono','Consolas',monospace;
      color: var(--primary); font-size: 12px; font-weight: 600;
      background: var(--primary-lt); padding: 2px 7px; border-radius: 5px;
      text-decoration: none; display: inline-flex; align-items: center; gap: 3px;
    }
    a.tid:hover { background: var(--primary); color: #fff; }
    span.tid {
      font-family: 'SF Mono','Consolas',monospace;
      color: var(--primary); font-size: 12px; font-weight: 600;
      background: var(--primary-lt); padding: 2px 7px; border-radius: 5px;
    }
    .pill { display: inline-flex; padding: 2px 9px; border-radius: 99px; font-size: 12px; font-weight: 500; }
    .pill-brand { background: #ede9fe; color: #6d28d9; }
    .pill-type  { background: #e0f2fe; color: #075985; }
    .pill-group { background: #fef9c3; color: #854d0e; }
    .pill-agent { background: #f0fdf4; color: #166534; }
    .comment-cell { max-width: 280px; color: var(--muted); font-style: italic; font-size: 12px; line-height: 1.5; }
    .no-comment { color: #cbd5e1; font-style: normal; }
    .date-cell { white-space: nowrap; color: var(--muted); font-size: 12px; }

    /* Analyze button */
    .btn-analyze {
      background: var(--primary-lt); color: var(--primary);
      border: 1.5px solid #c7d2fe; border-radius: 6px;
      padding: 4px 10px; font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: all .15s;
    }
    .btn-analyze:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-analyze:disabled { opacity: .5; cursor: not-allowed; }
    .btn-analyze.loading { opacity: .7; cursor: wait; }
    .btn-analyze.has-rca { background: #ede9fe; color: #6d28d9; border-color: #c4b5fd; }
    .btn-analyze.has-rca:hover { background: #6d28d9; color: #fff; border-color: #6d28d9; }

    /* -- MODAL ----------------------------------------------------- */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      z-index: 900; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-box {
      background: white; border-radius: 16px;
      width: 100%; max-width: 720px; max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 25px 60px rgba(0,0,0,.28);
      animation: mIn .2s ease;
    }
    @keyframes mIn { from{opacity:0;transform:scale(.95) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .modal-head {
      padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-start;
      position: sticky; top: 0; background: white; z-index: 1;
      border-radius: 16px 16px 0 0;
    }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--text); }
    .modal-sub   { font-size: 13px; color: var(--muted); margin-top: 3px; max-width: 500px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .modal-fd-link {
      font-size: 12px; color: var(--primary); text-decoration: none;
      display: inline-flex; align-items: center; gap: 3px; margin-top: 5px;
    }
    .modal-fd-link:hover { text-decoration: underline; }
    .modal-close {
      border: none; background: none; cursor: pointer;
      font-size: 20px; color: var(--muted); padding: 2px 5px;
      border-radius: 6px; flex-shrink: 0; line-height: 1;
    }
    .modal-close:hover { background: #f1f5f9; }
    .modal-body { padding: 20px 24px 24px; }

    /* RCA sections */
    .rca-section { background: #f8fafc; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
    .rca-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing:.06em; color: var(--muted); margin-bottom: 8px; }
    .rca-text { font-size: 14px; line-height: 1.65; color: var(--text); }
    .rca-list { list-style: none; padding: 0; margin: 0; }
    .rca-list li { font-size: 14px; line-height: 1.6; color: var(--text); padding: 4px 0 4px 20px; position: relative; }
    .rca-list li::before { content: '->'; position: absolute; left: 3px; color: var(--muted); font-size: 12px; }
    .rca-section.bad-s  { background: #fff5f5; }
    .rca-section.bad-s  .rca-label { color: var(--bad); }
    .rca-section.bad-s  .rca-list li::before { content: '*'; color: var(--bad); }
    .rca-section.good-s { background: #f0fdf4; }
    .rca-section.good-s .rca-label { color: var(--good); }
    .rca-section.good-s .rca-list li::before { content: '\2022'; color: var(--good); }
    .sev-chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600; margin-bottom: 16px; }
    .sev-high   { background: var(--bad-bg);  color: var(--bad);  }
    .sev-medium { background: var(--warn-bg); color: var(--warn); }
    .sev-low    { background: var(--good-bg); color: var(--good); }
    .csat-comment-box {
      background: #f8fafc; border-left: 3px solid var(--warn);
      border-radius: 0 8px 8px 0; padding: 10px 14px; margin-bottom: 16px;
      font-size: 13px; color: var(--text); font-style: italic; line-height: 1.5;
    }
    .csat-comment-label { font-style: normal; font-size: 11px; font-weight: 700; color: var(--warn); text-transform: uppercase; letter-spacing:.05em; margin-bottom: 4px; }
    .no-anthropic-warn {
      background: var(--warn-bg); border-radius: 8px; padding: 12px 16px;
      font-size: 13px; color: var(--warn); margin-bottom: 16px;
    }
    .rca-section.comment-analysis { background: #fefce8; }
    .rca-section.comment-analysis .rca-label { color: #854d0e; }
    .rca-section.agent-summary { background: #f0f9ff; }
    .rca-section.agent-summary .rca-label { color: #0369a1; }
    .rca-footer {
      margin-top: 16px; padding: 10px 14px;
      background: #f8fafc; border-radius: 8px;
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    }
    .btn-reanalyze {
      background: none; border: 1.5px solid var(--border); border-radius: 7px;
      padding: 5px 12px; font-size: 12px; cursor: pointer; color: var(--muted);
      transition: all .15s;
    }
    .btn-reanalyze:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* -- STATES ---------------------------------------------------- */
    .state-box { display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; padding:60px 20px; color:var(--muted); font-size:13px; }
    .spinner { width:24px; height:24px; border:2.5px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* -- AGENT LOGIN ----------------------------------------------- */
    .btn-login {
      background: none; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--muted);
      display: flex; align-items: center; gap: 6px; transition: all .15s;
    }
    .btn-login:hover { border-color: var(--primary); color: var(--primary); }
    .agent-chip {
      display: flex; align-items: center; gap: 8px;
      background: var(--primary-lt); border: 1.5px solid #c7d2fe;
      border-radius: 99px; padding: 4px 12px 4px 6px; cursor: default;
    }
    .agent-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .agent-name  { font-size: 13px; font-weight: 600; color: var(--text); }
    .agent-email { font-size: 11px; color: var(--muted); }
    .btn-logout {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 18px; line-height: 1; padding: 0 2px;
      margin-left: 2px;
    }
    .btn-logout:hover { color: var(--bad); }

    /* Login modal */
    .login-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .login-box {
      background: white; border-radius: 16px; width: 100%; max-width: 420px;
      box-shadow: 0 25px 60px rgba(0,0,0,.28); animation: mIn .2s ease; overflow: hidden;
    }
    .login-head {
      background: var(--primary); padding: 28px 28px 24px;
      color: white; text-align: center;
    }
    .login-head-icon { font-size: 32px; margin-bottom: 8px; }
    .login-head-title { font-size: 18px; font-weight: 700; }
    .login-head-sub { font-size: 13px; opacity: .8; margin-top: 4px; }
    .login-form { padding: 24px 28px 28px; }
    .lf-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing:.06em; display: block; margin-bottom: 6px; }
    .lf-input {
      width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 10px 13px; font-size: 14px; color: var(--text);
      transition: border-color .15s; margin-bottom: 16px;
    }
    .lf-input:focus { outline: none; border-color: var(--primary); }
    .login-error {
      background: var(--bad-bg); color: var(--bad); border-radius: 8px;
      padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none;
    }
    .btn-login-submit {
      width: 100%; background: var(--primary); color: white;
      border: none; border-radius: 8px; padding: 11px; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .btn-login-submit:hover { opacity: .88; }
    .btn-login-submit:disabled { opacity: .55; cursor: not-allowed; }
    .login-note { font-size: 12px; color: var(--muted); text-align: center; margin-top: 14px; line-height: 1.5; }
    .login-cancel { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 13px; text-decoration: underline; margin-top: 8px; display: block; width: 100%; text-align: center; }
    .login-cancel:hover { color: var(--text); }

    /* Lock hint in table */
    .analyze-lock { font-size: 12px; color: #cbd5e1; white-space: nowrap; }

    /* Admin gear button */
    .btn-admin-gear {
      background: none; border: none; cursor: pointer;
      font-size: 16px; line-height: 1; padding: 0 2px 0 4px;
      opacity: .7; transition: opacity .15s;
    }
    .btn-admin-gear:hover { opacity: 1; }

    /* Setup / Admin panel modals (reuse login-box styles) */
    .setup-box {
      background: white; border-radius: 16px; width: 100%; max-width: 460px;
      box-shadow: 0 25px 60px rgba(0,0,0,.28); animation: mIn .2s ease; overflow: hidden;
    }
    .admin-box {
      background: white; border-radius: 16px; width: 100%; max-width: 560px;
      box-shadow: 0 25px 60px rgba(0,0,0,.28); animation: mIn .2s ease; overflow: hidden;
      max-height: 88vh; overflow-y: auto;
    }
    .admin-head { background: var(--primary); padding: 22px 24px 18px; color: white; }
    .admin-head-title { font-size: 17px; font-weight: 700; }
    .admin-head-sub   { font-size: 13px; opacity: .8; margin-top: 3px; }
    .admin-body { padding: 22px 24px 26px; }
    .admin-section-title { font-size: 13px; font-weight: 700; color: var(--text); margin: 0 0 12px; }
    .agent-list { list-style: none; padding: 0; margin: 0 0 20px; }
    .agent-list-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
      margin-bottom: 8px; background: #fafafa;
    }
    .agent-list-info { display: flex; align-items: center; gap: 10px; }
    .agent-list-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .agent-list-name  { font-size: 13px; font-weight: 600; }
    .agent-list-email { font-size: 12px; color: var(--muted); }
    .agent-list-role  { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 99px; }
    .role-admin { background: #ede9fe; color: #6d28d9; }
    .role-agent { background: #f0fdf4; color: #166534; }
    .btn-delete-agent {
      background: none; border: 1.5px solid var(--border); border-radius: 6px;
      padding: 4px 10px; font-size: 12px; color: var(--muted); cursor: pointer;
    }
    .btn-delete-agent:hover { border-color: var(--bad); color: var(--bad); background: var(--bad-bg); }
    .create-agent-form { border: 1.5px solid var(--border); border-radius: 10px; padding: 16px; background: #fafafa; }
    .create-form-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .admin-error {
      background: var(--bad-bg); color: var(--bad); border-radius: 8px;
      padding: 10px 14px; font-size: 13px; margin-bottom: 12px; display: none;
    }
    .admin-success {
      background: var(--good-bg); color: var(--good); border-radius: 8px;
      padding: 10px 14px; font-size: 13px; margin-bottom: 12px; display: none;
    }
    .admin-close-row { text-align: right; margin-top: 16px; }
    .agents-loading { font-size: 13px; color: var(--muted); padding: 12px 0; }

    /* -- MANAGE MEMBERS BUTTON ------------------------------------- */
    .btn-manage-members {
      background: var(--primary-lt); color: var(--primary);
      border: 1.5px solid #c7d2fe; border-radius: 8px;
      padding: 6px 14px; font-size: 13px; font-weight: 600;
      cursor: pointer; display: none; align-items: center; gap: 6px;
      transition: all .15s;
    }
    .btn-manage-members:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

async function loadRcaStatus() {
  if (!loggedInAgent) return
  try {
    const params = new URLSearchParams({ action: 'get_rcas' })
    const res = await fetch(`${EDGE_URL}?${params}`, { headers: { ...authHeaders() } })
    if (!res.ok) return
    const data = await res.json()
    if (!data.rcas) return

    // Update rcaMap
    rcaMap = {}
    data.rcas.forEach(r => { rcaMap[r.ticket_id] = r })

    // Update any visible Analyze buttons
    Object.keys(rcaMap).forEach(tid => {
      const btn = $(`abtn-${tid}`)
      if (btn && !btn.disabled) {
        btn.textContent = 'View RCA'
        btn.classList.add('has-rca')
      }
    })
  } catch (_) { /* silently ignore */ }
}

/* ====================================================================
   ANALYZE / MODAL
   ==================================================================== */
async function analyzeTicket(ticketId, force = false) {
  const row = badTicketMap[ticketId] || {}

  // Disable the button while loading
  const btn = $(`abtn-${ticketId}`)
  const hadRca = rcaMap[ticketId]
  if (btn) { btn.disabled = true; btn.classList.add('loading'); btn.textContent = 'Loading...' }

  showModal(ticketId, row)

  try {
    const params = new URLSearchParams({
      action:      'analyze',
      ticket_id:   ticketId,
      comment:     row.comment || '',
      analyzed_by: loggedInAgent?.name || loggedInAgent?.email || 'Unknown',
      force:       force ? 'true' : 'false'
    })
    const res = await fetch(`${EDGE_URL}?${params}`, {
      headers: { ...authHeaders() }
    })
    const data = await res.json()
    if (!res.ok || data.error) throw new Error(data.error || `Server error ${res.status}`)

    // Update local rcaMap so button stays styled correctly
    if (data.saved) {
      rcaMap[ticketId] = {
        ticket_id:   ticketId,
        analyzed_by: data.analyzed_by,
        analyzed_at: data.analyzed_at,
        severity:    data.analysis?.severity
      }
    }

    renderAnalysis(ticketId, row, data)
  } catch (err) {
    $('modalBody').innerHTML = `
      <div class="modal-body">
        <div class="state-box" style="color:var(--bad)">
          ?? ${esc(err.message)}<br>
          <small style="color:var(--muted);margin-top:8px;display:block">
            Make sure the Edge Function is updated and ANTHROPIC_API_KEY is set in Supabase.
          </small>
        </div>
      </div>`
  } finally {
    if (btn) {
      btn.disabled = false
      btn.classList.remove('loading')
      if (rcaMap[ticketId]) {
        btn.textContent = 'View RCA'
        btn.classList.add('has-rca')
      } else {
        btn.textContent = 'Analyze'
        btn.classList.remove('has-rca')
      }
    }
  }
}

/* -- Auth headers helper --------------------------------------------- */
// Admin uses x-admin-token (avoids Supabase JWT pre-validation).
// Regular agents use Authorization: Bearer <supabase-jwt>.
function authHeaders() {
  if (!loggedInAgent) return {}
  if (loggedInAgent.token === EDGE_SECRET) {
    // Hardcoded admin: send anon key as Bearer so Supabase passes the request,
    // plus x-admin-token so our Edge Function recognises admin privileges.
    return {
      'Authorization':  `Bearer ${SB_KEY}`,
      'x-admin-token':  EDGE_SECRET
    }
  }
  return { 'Authorization': `Bearer ${loggedInAgent.token}` }
}

/* -- 24-hour Session Persistence ------------------------------------- */
const SESSION_KEY = 'csat_session_v1'
const SESSION_TTL = 24 * 60 * 60 * 1000  // 24 hours in ms

function saveSession(agent, supabaseSession = null) {
  const payload = {
    agent,
    supabaseSession: supabaseSession ? {
      access_token:  supabaseSession.access_token,
      refresh_token: supabaseSession.refresh_token
    } : null,
    loginTime: Date.now()
  }
  try { localStorage.setItem(SESSION_KEY, JSON.stringify(payload)) } catch(e) {}
}

function clearSavedSession() {
  try { localStorage.removeItem(SESSION_KEY) } catch(e) {}
}

async function restoreSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY)
    if (!raw) return false
    const { agent, supabaseSession, loginTime } = JSON.parse(raw)
    if (!agent || !loginTime) return false
    // Expired beyond 24 hours
    if (Date.now() - loginTime > SESSION_TTL) { clearSavedSession(); return false }

    // Admin shortcut — uses EDGE_SECRET, no Supabase session to refresh
    if (agent.token === EDGE_SECRET) {
      loggedInAgent = agent
      return true
    }

    // Regular Supabase user — restore + auto-refresh the session
    if (!supabaseSession) return false
    const { data: refreshed, error } = await sb.auth.setSession({
      access_token:  supabaseSession.access_token,
      refresh_token: supabaseSession.refresh_token
    })
    if (error || !refreshed?.session) { clearSavedSession(); return false }

    // Update with fresh access_token and persist
    loggedInAgent = { ...agent, token: refreshed.session.access_token }
    saveSession(loggedInAgent, refreshed.session)
    return true
  } catch(e) {
    clearSavedSession()
    return false
  }
}

async function loginUser() {
  const email    = $('loginEmail').value.trim().toLowerCase()
  const password = $('loginPassword').value
  if (!email)    { showLoginError('Please enter your email.'); return }
  if (!password) { showLoginError('Please enter your password.'); return }

  const btn = $('loginBtn')
  btn.disabled = true
  btn.textContent = 'Signing in...'
  $('loginError').style.display = 'none'

  try {
    // -- Hardcoded admin shortcut (no Supabase Auth needed) ----------
    if (email === ADMIN_EMAIL && password === ADMIN_PW) {
      loggedInAgent = {
        id:       'admin-hardcoded',
        name:     'Mrudhul',
        email:    ADMIN_EMAIL,
        role:     'admin',
        token:    EDGE_SECRET,
        initials: 'MR'
      }
      saveSession(loggedInAgent)
      closeLoginModal()
      renderAgentChip()
      renderAll()
      return
    }

    // -- Regular agents ? use Supabase Auth --------------------------
    const { data: authData, error: authErr } = await sb.auth.signInWithPassword({ email, password })
    if (authErr) throw new Error(authErr.message)

    const token = authData.session?.access_token
    if (!token) throw new Error('No session token received.')

    // Fetch profile from dashboard_users
    const { data: profile, error: profErr } = await sb
      .from('dashboard_users')
      .select('name, role')
      .eq('id', authData.user.id)
      .single()

    if (profErr || !profile) throw new Error('Account not found in dashboard. Contact admin.')

    loggedInAgent = {
      id:       authData.user.id,
      name:     profile.name,
      email:    authData.user.email,
      role:     profile.role,
      token:    token,
      initials: profile.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase()
    }
    saveSession(loggedInAgent, authData.session)

    closeLoginModal()
    renderAgentChip()

    // Agents see their own tickets by default
    if (loggedInAgent.role === 'agent') {
      const sel = $('fAgent')
      const opt = [...sel.options].find(o => o.value === loggedInAgent.name)
      if (opt) sel.value = loggedInAgent.name
    }

    renderAll()

  } catch (err) {
    showLoginError(err.message)
    btn.disabled = false
    btn.textContent = 'Sign In'
  }
}

  const agentId = $('resetPwAgentId').value
  const newPw   = $('resetPwNew').value
  const confPw  = $('resetPwConfirm').value
  const errEl   = $('resetPwError')
  const okEl    = $('resetPwSuccess')

  errEl.style.display = 'none'
  okEl.style.display  = 'none'

  if (!newPw || newPw.length < 8) {
    errEl.textContent   = 'Password must be at least 8 characters.'
    errEl.style.display = 'block'
    return
  }
  if (newPw !== confPw) {
    errEl.textContent   = 'Passwords do not match.'
    errEl.style.display = 'block'
    return
  }

  const btn = $('resetPwBtn')
  btn.disabled    = true
  btn.textContent = 'Resetting...'

  try {
    const params = new URLSearchParams({ action: 'reset_member_password', agent_id: agentId, new_password: newPw })
    const res    = await fetch(`${EDGE_URL}?${params}`, {
      method: 'POST',
      headers: { ...authHeaders() }
    })
    let data = {}
    try { data = await res.json() } catch(_) {}
    if (!res.ok || data.error) throw new Error(data.error || `Server error ${res.status}`)

    okEl.textContent   = 'Password reset successfully.'
    okEl.style.display = 'block'
    $('resetPwNew').value    = ''
    $('resetPwConfirm').value = ''
  } catch (err) {
    errEl.textContent   = err.message
    errEl.style.display = 'block'
  } finally {
    btn.disabled    = false
    btn.textContent = 'Reset Password'
  }
}

/* -- Boot ------------------------------------------------------------ */
async function init() {
  initDates(90)

  // Silently restore session from localStorage (up to 24 hours)
  const restored = await restoreSession()

  ALL = await fetchAll()
  const now = new Date()
  $('lastSync').textContent = `Updated ${now.toLocaleTimeString()}`
  $('recMeta').textContent  = `. ${ALL.length.toLocaleString()} records`
  populateDropdowns(ALL)

  if (restored) {
    renderAgentChip()
    // Re-apply agent's default filter if they are a regular agent
    if (loggedInAgent?.role === 'agent') {
      const sel = $('fAgent')
      const opt = [...sel.options].find(o => o.value === loggedInAgent.name)
      if (opt) sel.value = loggedInAgent.name
    }
  }

  renderAll()
}

init()
</script>
</body>
</html>
